title: Breeze Ng
email: breeze_ng@qq.com
description: "Breeze Ng's site and technical blog on computer vision, drone inspection, large models, agent systems, and embodied intelligence."
url: "https://challovactor.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
excerpt_separator: <!--more-->
future: true

author:
  name: Breeze Ng
  email: breeze_ng@qq.com
  github: Challovactor

social:
  name: Breeze Ng
  links:
    - https://github.com/Challovactor

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

paginate: 2
paginate_path: "/blog/page:num/"

comments:
  provider: utterances
  utterances_repo: "Challovactor/Challovactor.github.io"
  utterances_issue_term: "pathname"
  utterances_label: "comment"
  utterances_theme: "github-light"

analytics:
  busuanzi: true
  goatcounter_site: ""
  google_tag_id: ""

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /:year/:month/:day/:title/

kramdown:
  input: GFM
  syntax_highlighter: rouge
