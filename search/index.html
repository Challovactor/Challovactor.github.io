---
layout: default
title: Search | Breeze Ng
description: "Search posts on Breeze Ng's blog."
permalink: /search/
---
<main class="search-main">
  <section class="section reveal page-hero">
    <div class="section-heading">
      <p class="eyebrow">SEARCH INDEX</p>
      <h1 class="page-title">站内搜索</h1>
    </div>

    <p class="page-intro">
      搜索文章标题、正文、标签或分类。这个页面走的是纯前端检索，不依赖后端服务。
    </p>

    <form class="search-panel search-panel-large" data-search-form>
      <label class="search-label" for="search-input">输入关键词</label>
      <div class="search-bar">
        <input
          id="search-input"
          name="q"
          type="search"
          placeholder="例如：agent workflow、LLM、automation"
          autocomplete="off"
        />
        <button class="button button-primary" type="submit">搜索</button>
      </div>
    </form>

    <div class="signal-strip signal-strip-blog">
      <div class="signal-card">
        <span class="signal-label">索引内容</span>
        <strong>文章标题 / 摘要 / 正文 / 标签 / 分类</strong>
      </div>
      <div class="signal-card">
        <span class="signal-label">数据源</span>
        <strong>/search.json</strong>
      </div>
      <div class="signal-card">
        <span class="signal-label">检索方式</span>
        <strong>Client-side Filtering</strong>
      </div>
    </div>
  </section>

  <section class="section reveal">
    <div class="search-status" id="search-status">输入关键词开始搜索。</div>
    <div class="post-list" id="search-results"></div>
  </section>
</main>
